<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Pay Karo</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    padding: 20px;
  }

  .card {
    background: rgba(255, 255, 255, 0.08);
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 600px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  h1 {
    color: #ffcc00;
    font-size: 2rem;
    line-height: 1.4;
    margin-bottom: 20px;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
  }

  .amount {
    font-size: 3rem;
    color: #ff4d4d;
    font-weight: bold;
    margin: 15px 0;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .hindi-line {
    margin-top: 30px;
    font-size: 1.3rem;
    color: #ff0000;
    font-weight: 600;
    border-top: 1px solid rgba(255,255,255,0.3);
    padding-top: 20px;
  }
</style>
</head>
<body>

  <div class="card">
    <h1>Please Pay 
      <div class="amount">₹1000</div>
      to the Developer for Access the Website<br>
      otherwise forget that you have any website
    </h1>

    <div class="hindi-line">
      मुसीबत में साथ देते हैं, भागते नहीं 🙏
    </div>
  </div>

</body>
</html>
