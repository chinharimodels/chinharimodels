<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery - Chinhari Models</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --gold:#c9a84c;
      --gold-light:#e8cc80;
      --black:#0a0a0a;
      --dark:#111111;
      --dark2:#1a1a1a;
      --white:#f5f0e8;
      --border:rgba(201,168,76,0.25);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--black);
      color:var(--white);
      font-family:'Montserrat',sans-serif;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    nav{
      position:sticky;
      top:0;
      z-index:100;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 44px;
      background:rgba(10,10,10,0.96);
      border-bottom:1px solid var(--border);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-logo{
      width:50px;
      height:50px;
      object-fit:contain;
      background:#000;
      border:1px solid var(--border);
      border-radius:14px;
      padding:5px;
    }

    .brand-text{
      font-family:'Cormorant Garamond',serif;
      font-size:1.3rem;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .brand-text span{
      color:var(--gold);
    }

    .nav-links{
      display:flex;
      list-style:none;
      gap:24px;
    }

    .nav-links a{
      font-size:.68rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      opacity:.76;
      transition:.3s;
      position:relative;
    }

    .nav-links a::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-5px;
      height:1px;
      background:var(--gold);
      transform:scaleX(0);
      transform-origin:left;
      transition:.3s;
    }

    .nav-links a:hover,
    .nav-links a.active{
      color:var(--gold-light);
      opacity:1;
    }

    .nav-links a:hover::after,
    .nav-links a.active::after{
      transform:scaleX(1);
    }

    .page-header{
      padding:90px 48px 40px;
      background:
        radial-gradient(circle at top center, rgba(201,168,76,0.16), transparent 30%),
        linear-gradient(135deg,#0a0a0a 0%,#181107 45%,#0a0a0a 100%);
    }

    .section-label{
      font-size:.65rem;
      letter-spacing:.35em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:16px;
    }

    .page-title{
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2.8rem, 6vw, 4.8rem);
      font-weight:300;
      line-height:1.05;
      margin-bottom:18px;
    }

    .page-title em{
      font-style:italic;
      color:var(--gold-light);
    }

    .page-subtext{
      max-width:760px;
      font-size:.92rem;
      line-height:2;
      opacity:.72;
    }

    .content{
      padding:70px 48px 90px;
      background:var(--dark);
    }

    .gallery-group{
      margin-top:14px;
    }

    .gallery-group + .gallery-group{
      margin-top:80px;
    }

    .gallery-group-title{
      font-family:'Cormorant Garamond',serif;
      font-size:2rem;
      font-weight:300;
      margin-bottom:20px;
      color:var(--gold-light);
    }

    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:14px;
    }

    .gallery-item{
      position:relative;
      overflow:hidden;
      aspect-ratio:4/5;
      background:var(--dark2);
      display:block;
      border:1px solid var(--border);
    }

    .gallery-item img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
      transition:transform .45s ease;
    }

    .gallery-item:hover img{
      transform:scale(1.05);
    }

    .gallery-placeholder{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:18px;
      font-size:.72rem;
      line-height:1.8;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--gold);
      background:linear-gradient(160deg,#151515,#211809);
    }

    footer{
      border-top:1px solid var(--border);
      background:#080808;
      padding:24px;
      text-align:center;
    }

    .footer-copy{
      font-size:.68rem;
      letter-spacing:.12em;
      opacity:.45;
      text-transform:uppercase;
    }

    @media(max-width:900px){
      nav{
        padding:16px 18px;
        flex-direction:column;
        gap:14px;
      }

      .nav-links{
        flex-wrap:wrap;
        justify-content:center;
      }

      .page-header,
      .content{
        padding-left:22px;
        padding-right:22px;
      }

      .gallery-grid{
        grid-template-columns:1fr 1fr;
      }
    }

    @media(max-width:640px){
      .brand-text{
        font-size:1rem;
        letter-spacing:.12em;
      }

      .gallery-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
